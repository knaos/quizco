name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DB_HOST: 127.0.0.1
  DB_PORT: "5432"
  DB_USER: quizuser
  DB_PASSWORD: quizpassword
  DATABASE_URL: postgresql://quizuser:quizpassword@127.0.0.1:5432/quizco

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: quizco
          POSTGRES_USER: quizuser
          POSTGRES_PASSWORD: quizpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quizuser -d quizco"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema apps/server/prisma/schema.prisma

      - name: Push Prisma schema
        run: npx prisma db push --schema apps/server/prisma/schema.prisma

      - name: Build shared package
        run: npm run build -w @quizco/shared

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: validate
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    env:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: quizuser
      DB_PASSWORD: quizpassword
      DATABASE_URL: postgresql://quizuser:quizpassword@postgres:5432/quizco
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: quizco
          POSTGRES_USER: quizuser
          POSTGRES_PASSWORD: quizpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quizuser -d quizco"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema apps/server/prisma/schema.prisma

      - name: Push Prisma schema
        run: npx prisma db push --schema apps/server/prisma/schema.prisma

      - name: Build shared package
        run: npm run build -w @quizco/shared

      - name: Run Playwright smoke suite
        run: npm run test:e2e -w @quizco/e2e -- tests/smoke.spec.ts

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            apps/e2e/test-results
            apps/e2e/playwright-report
          if-no-files-found: ignore
